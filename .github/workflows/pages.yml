name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create environment file
        run: |
          cat <<EOF > .env.local
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          TMDB_BEARER_TOKEN=${{ secrets.TMDB_BEARER_TOKEN }}
          WATCHMODE_API_KEY=${{ secrets.WATCHMODE_API_KEY }}
          LETTERBOXD_CLIENT_ID=${{ secrets.LETTERBOXD_CLIENT_ID }}
          LETTERBOXD_CLIENT_SECRET=${{ secrets.LETTERBOXD_CLIENT_SECRET }}
          LETTERBOXD_USERNAME=${{ secrets.LETTERBOXD_USERNAME }}
          EOF

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
